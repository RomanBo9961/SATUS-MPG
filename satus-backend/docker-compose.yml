services:
  mongodb:
    image: mongo:7.0
    container_name: satus_mongo_dev
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: satus_password123
      MONGO_INITDB_DATABASE: satus_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - satus_net

  # Itfz Visual DB 
  mongo-express:
    image: mongo-express:latest
    container_name: satus_mongo_express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: satus_password123
      ME_CONFIG_MONGODB_URL: mongodb://admin:satus_password123@mongodb:27017/
      ME_CONFIG_BASICAUTH_USERNAME: root
      ME_CONFIG_BASICAUTH_PASSWORD: root
    depends_on:
      - mongodb
    networks:
      - satus_net

volumes:
  mongo_data:

networks:
  satus_net:
    driver: bridge
